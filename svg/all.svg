  </style>

  <!-- Direct image load -->
  <image href="https://1priq5vlzb2iy0i98blwup8w6nce0d21r.oastify.com/200/directimage"
         x="0" y="0" width="100" height="100"/>

  <!-- Filter using external image -->
  <defs>
    <filter id="kittenFilter">
      <feImage href="https://1priq5vlzb2iy0i98blwup8w6nce0d21r.oastify.com/200/      <feImage href="https://1priq5vlzb2iy0i98blwup8w6nce0d21r.oastify.com/200/200" result="img"/>
" result="img"/>
      <feBlend in="SourceGraphic" in2="img" mode="multiply"/>
    </filter>
  </defs>

  <rect x="110" y="0" width="100" height="100" filter="url(#kittenFilter)"/>

  <!-- Pattern referencing external image -->
  <defs>
    <pattern id="kittenPattern" patternUnits="userSpaceOnUse" width="100" height="100">
