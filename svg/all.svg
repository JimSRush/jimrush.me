<?xml-stylesheet type="text/css" href="https://1priq5vlzb2iy0i98blwup8w6nce0d21r.oastify.com/200/200"?>

<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="400" height="400">

  <!-- Embedded CSS with external fetches -->
  <style>
    @font-face {
      font-family: "KittenFont";
      src: url("https://1priq5vlzb2iy0i98blwup8w6nce0d21r.oastify.com/200/200");
    }

    .bg {
      fill: url("https://1priq5vlzb2iy0i98blwup8w6nce0d21r.oastify.com/200/200");
