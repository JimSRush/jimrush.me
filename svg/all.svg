    </pattern>
  </defs>

  <rect x="0" y="110" width="100" height="100" fill="url(#kittenPattern)"/>

  <!-- External <use> reference -->
  <use href="https://1priq5vlzb2iy0i98blwup8w6nce0d21r.oastify.com/200/href#id"
       x="110" y="110" width="100" height="100"/>

  <!-- Script reference -->
  <script href="https://1priq5vlzb2iy0i98blwup8w6nce0d21r.oastify.com/200/200/script"></script>

